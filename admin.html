<style>

function escHtml(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toMins(t){if(!t)return null;const[h,m]=(t+':00').split(':').map(Number);return h*60+(m||0);}
function calcLogHours(l){if(l.total_hours)return l.total_hours;let tot=0;const amIn=toMins(l.am_in),amOut=toMins(l.am_out),pmIn=toMins(l.pm_in),pmOut=toMins(l.pm_out);if(amIn!==null&&amOut!==null&&amOut>amIn)tot+=amOut-amIn;if(pmIn!==null&&pmOut!==null&&pmOut>pmIn)tot+=pmOut-pmIn;return tot>0?tot/60:null;}
function fmtHours(h){if(h===null||h===undefined)return'—';return Math.floor(h)+'h '+String(Math.round((h%1)*60)).padStart(2,'0')+'m';}
function timeAgo(ts){
  if(!ts)return'—';
  // Normalize to UTC: append Z if no timezone info present
  const s=(/Z$|[+-]\d{2}:\d{2}$/.test(ts))?ts:ts+'Z';
  const now=Date.now(),diff=now-new Date(s).getTime(),mins=Math.floor(diff/60000);
  if(mins<1)return'just now';
  if(mins<60)return mins+'m ago';
  const hrs=Math.floor(mins/60);
  if(hrs<24)return hrs+'h ago';
  return Math.floor(hrs/24)+'d ago';
}

const NAV_ICONS = {
  logs:      `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="13" y2="18"/></svg>`,
  dashboard: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>`,
  interns:   `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="3"/><path d="M3 21v-1a6 6 0 0 1 6-6h0a6 6 0 0 1 6 6v1"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-1a4 4 0 0 0-3-3.85"/></svg>`,
  messages:  `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
  board:     `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>`,
  admin:     `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6L12 2z"/></svg>`,
};
function renderNav(active){
  const links=[
    {href:'daily-logs.html',   icon:NAV_ICONS.logs,      label:'Daily Logs', key:'logs',     adminOnly:true},
    {href:'dashboard.html',    icon:NAV_ICONS.dashboard,  label:'Dashboard',  key:'dashboard'},
    {href:'interns.html',      icon:NAV_ICONS.interns,    label:'Interns',    key:'interns'},
    {href:'messages.html',     icon:NAV_ICONS.messages,   label:'Messages',   key:'messages'},
    {href:'announcements.html',icon:NAV_ICONS.board,      label:'Board',      key:'announcements'},
    {href:'admin.html',        icon:NAV_ICONS.admin,      label:'Admin',      key:'admin',    adminOnly:true},
  ];
  return links.map(n=>`<a href="${n.href}" class="snav-item${active===n.key?' active':''}${n.adminOnly?' admin-only':''}" data-key="${n.key}"><span class="snav-icon">${n.icon}</span><span class="snav-label">${n.label}</span></a>`).join('');
}
function toggleMobileNav(){document.getElementById('sidebarNav').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('show');}
async function doLogout(){await sb.auth.signOut();window.location.href='index.html';}
function setupUser(p,active){document.getElementById('navLinks').innerHTML=renderNav(active);const name=p?.name||currentUser.email?.split('@')[0]||'Intern';document.getElementById('navUserName').textContent=name;document.getElementById('navUserRole').textContent=p?.role||'intern';const av=document.getElementById('navAvatar');const col=avatarColor(name);av.style.background=col+'20';av.style.color=col;av.textContent=avatarInitials(name);if(p?.role==='admin')document.querySelectorAll('.admin-only').forEach(el=>el.style.display='flex');}
let allUsers=[],allLogs=[],allAnns=[],cbFn=null;
function switchTab(name,btn){document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.admin-tab').forEach(b=>b.classList.remove('active'));document.getElementById('tab-'+name).classList.add('active');if(btn)btn.classList.add('active');if(name==='announcements')renderAdminAnns();}
function showConfirm(title,msg,cb){document.getElementById('confirmTitle').textContent=title;document.getElementById('confirmMsg').textContent=msg;cbFn=cb;document.getElementById('confirmOv').classList.add('open');}
function closeConfirm(){document.getElementById('confirmOv').classList.remove('open');cbFn=null;}
document.getElementById('confirmOkBtn').onclick=()=>{closeConfirm();if(cbFn)cbFn();};
/* Interns */
function filterInternTable(){const q=document.getElementById('internSearch').value.toLowerCase(),d=document.getElementById('internDeptFilter').value.toLowerCase();renderInternTable(allUsers.filter(u=>(!q||(u.name||'').toLowerCase().includes(q)||(u.email||'').toLowerCase().includes(q))&&(!d||(u.department||'').toLowerCase().includes(d))));}
function renderInternTable(list){
  const tb=document.getElementById('internTbody');
  if(!list.length){tb.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--text-dim);padding:30px;font-family:var(--mono);font-size:11px">No interns found</td></tr>';return;}
  tb.innerHTML=list.map(u=>{const col=avatarColor(u.name);const isAdm=u.role==='admin';return`<tr><td><div style="display:flex;align-items:center;gap:8px"><div class="avatar avatar-sm" style="background:${col}20;color:${col}">${avatarInitials(u.name)}</div><span style="font-family:var(--mono);font-size:11px;color:var(--text)">${escHtml(u.name||'—')}</span></div></td><td style="color:var(--text-muted)">${escHtml(u.email||'—')}</td><td style="color:var(--blue)">${escHtml(u.department||'—')}</td><td><span class="badge ${isAdm?'badge-admin':'badge-intern'}">${u.role||'intern'}</span></td><td style="color:var(--text-dim)">${fmtDate(u.created_at)}</td><td><div style="display:flex;gap:5px;align-items:center">${!isAdm?`<button class="act-btn promote" onclick="promoteUser('${u.id}','${escHtml(u.name)}')">↑ Admin</button>`:`<button class="act-btn" onclick="demoteUser('${u.id}','${escHtml(u.name)}')">↓ Intern</button>`}<button class="act-btn" onclick="resetPw('${escHtml(u.email)}')">🔑 PW</button><button class="act-btn danger" onclick="disableUser('${u.id}','${escHtml(u.name)}')">✕</button></div></td></tr>`;}).join('');
}
async function promoteUser(id,name){showConfirm('Promote to Admin','Promote '+name+' to admin?',async()=>{const{error}=await sb.from('users').update({role:'admin'}).eq('id',id);if(error){toast('Failed','err');return;}toast(name+' promoted','ok');await loadUsers();});}
async function demoteUser(id,name){showConfirm('Demote User','Demote '+name+' back to intern?',async()=>{const{error}=await sb.from('users').update({role:'intern'}).eq('id',id);if(error){toast('Failed','err');return;}toast(name+' demoted','ok');await loadUsers();});}
async function resetPw(email){showConfirm('Reset Password','Send password reset to '+email+'?',async()=>{const{error}=await sb.auth.resetPasswordForEmail(email);if(error){toast('Failed','err');return;}toast('Reset email sent','ok');});}
async function disableUser(id,name){showConfirm('Disable Account','Disable '+name+"'s account?",async()=>{const{error}=await sb.from('users').update({role:'disabled'}).eq('id',id);if(error){toast('Failed','err');return;}toast(name+' disabled','ok');await loadUsers();});}
/* Logs */
function filterLogs(){const q=document.getElementById('logSearch').value.toLowerCase(),dt=document.getElementById('logDate').value,mo=document.getElementById('logMonth').value;renderLogs(allLogs.filter(l=>(!q||(l.users?.name||'').toLowerCase().includes(q))&&(!dt||l.date===dt)&&(!mo||l.date?.startsWith(mo))));}
function clearLogFilters(){document.getElementById('logSearch').value='';document.getElementById('logDate').value='';document.getElementById('logMonth').value='';renderLogs(allLogs);}
function renderLogs(list){
  const tb=document.getElementById('logTbody');
  if(!list.length){tb.innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--text-dim);padding:30px;font-family:var(--mono);font-size:11px">No logs found</td></tr>';return;}
  tb.innerHTML=list.map(l=>{const h=fmtHours(calcLogHours(l));return`<tr><td style="color:var(--text)">${escHtml(l.users?.name||'—')}</td><td style="color:var(--text-muted)">${l.date||'—'}</td><td style="color:var(--blue)">${l.am_in||'—'}</td><td style="color:var(--blue)">${l.am_out||'—'}</td><td style="color:var(--primary)">${l.pm_in||'—'}</td><td style="color:var(--primary)">${l.pm_out||'—'}</td><td style="color:var(--green);font-weight:700">${h}</td></tr>`;}).join('');
}
/* Announcements */
async function postAnn(){
  const title=document.getElementById('adminAnnTitle').value.trim(),msg=document.getElementById('adminAnnBody').value.trim();
  if(!title||!msg){toast('Fill in both fields','err');return;}
  const{error}=await sb.from('announcements').insert({title,message:msg,created_by:currentUser.id});
  if(error){toast('Failed: '+error.message,'err');return;}
  document.getElementById('adminAnnTitle').value='';document.getElementById('adminAnnBody').value='';
  toast('Posted!','ok');await loadAnns();renderAdminAnns();
}
async function delAnn(id){showConfirm('Delete','Delete this announcement permanently?',async()=>{await sb.from('announcements').delete().eq('id',id);toast('Deleted','ok');await loadAnns();renderAdminAnns();});}
function renderAdminAnns(){
  const c=document.getElementById('adminAnnList');
  if(!allAnns.length){c.innerHTML='<div class="empty-state"><div class="empty-icon"></div><div class="empty-sub">No announcements yet</div></div>';return;}
  c.innerHTML=allAnns.map(a=>`<div class="card" style="margin-bottom:12px"><div class="card-header"><div class="card-title" style="font-size:12px">${escHtml(a.title)}</div><button class="act-btn danger" onclick="delAnn('${a.id}')">✕ Delete</button></div><div class="card-body" style="padding:14px 20px"><p style="font-family:var(--body);font-size:13px;color:var(--text-muted);line-height:1.6">${escHtml(a.message)}</p><p style="font-family:var(--mono);font-size:9px;color:var(--text-dim);margin-top:10px">${fmtDate(a.created_at)} · ${timeAgo(a.created_at)}</p></div></div>`).join('');
}
/* Load */
async function loadUsers(){const{data}=await sb.from('users').select('*').order('created_at',{ascending:false});allUsers=data||[];renderInternTable(allUsers);const adminCt=allUsers.filter(u=>u.role==='admin').length;document.getElementById('statsRow').innerHTML=`<div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-value">${allUsers.length}</div></div><div class="stat-card"><div class="stat-label">Interns</div><div class="stat-value" style="color:var(--blue)">${allUsers.filter(u=>u.role==='intern').length}</div></div><div class="stat-card"><div class="stat-label">Admins</div><div class="stat-value" style="color:var(--purple)">${adminCt}</div></div><div class="stat-card"><div class="stat-label">Time Logs</div><div class="stat-value" style="color:var(--green)">${allLogs.length}</div></div>`;}
async function loadLogs(){const{data}=await sb.from('time_logs').select('*,users(name)').order('date',{ascending:false});allLogs=data||[];renderLogs(allLogs);}
async function loadAnns(){const{data}=await sb.from('announcements').select('*,users(name)').order('created_at',{ascending:false});allAnns=data||[];}
async function boot(){
  sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  currentUser=session.user;
  const{data:p}=await sb.from('users').select('*').eq('id',currentUser.id).single();
  if(p?.role!=='admin'){toast('Admin access required','err');setTimeout(()=>window.location.href='dashboard.html',1500);document.getElementById('loadingOverlay').classList.add('hidden');return;}
  setupUser(p,'admin');
  await Promise.all([loadLogs(),loadAnns()]);
  await loadUsers();
  document.getElementById('loadingOverlay').classList.add('hidden');

  // ── Poll for new messages every 10s ─────────────────
  HubMsgPoller.start(sb, currentUser.id);
}
boot();
</script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});</script></body></html>
